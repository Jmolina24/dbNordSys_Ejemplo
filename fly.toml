# fly.toml app configuration file generated for dbnordsys on 2026-07-09T09:24:40-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'dbnordsys'
primary_region = 'ams'

[build]
dockerfile = 'Dockerfile'

[mounts]
source = 'mysql_data'
destination = '/var/lib/mysql'

[services]
protocol = 'tcp'
internal_port = 3306

[services.ports]
port = 3306

[services.tcp_checks]
interval = '15s'
timeout = '2s'

[vm]
memory = '1gb'
cpu_kind = 'shared'
cpus = 1
memory_mb = 1024
